name: kilo_remote_flutter
description: Remote client for Kilo CLI sessions
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  web_socket_channel: ^3.0.2
  dio: ^5.8.0+1
  flutter_markdown: ^0.7.7
  flutter_secure_storage: ^9.2.4
  webview_flutter: ">=4.0.0 <4.11.0"
  flutter_inappwebview: ^6.1.5
  url_launcher: ^6.3.1
  go_router: any
  uuid: ^4.5.1
  json_annotation: ^4.9.0
  google_fonts: ^6.2.1
  freezed_annotation: ^2.4.4
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  webview_flutter_android: ">=3.0.0 <4.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.0
  freezed: ">=2.5.0 <2.5.8"
  riverpod_generator: ^2.6.3
  mockito: ^5.4.4
  build_verify: ^3.1.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#D4A574"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
